# .iteration/config.yaml — self-hosted install of auto-routines on its own repo.
# Goal: meta-improve the skill autonomously. PRD lives in .iteration/goal.md.

schema_version: 4  # PRD #10: schema 4 adds execution_surface, idle_window, gha_minutes_cap, kill_switch
repo_slug: "auto-routines"
goal: "Evolve auto-routines into a robust, well-tested, self-improving skill that other repos use without surprises."
mode: goal-driven
created_at: "2026-05-09T19:17:24+0200"
last_iter: 1

deps:
  gh: required
  mcps:
    - scheduled-tasks

routines:
  - id: prd-implement
    state: ACTIVE
    enabled: true
    primitive: scheduled
    execution_surface: local  # PRD #10 Module 5; default preserves v3 (local fire)
    est_minutes: 5             # for meta.gha_minutes_cap accounting once on gha
    trigger:
      cron: "0 */12 * * *"
      human: "every 12 hours"
    purpose: "On a schedule, pick the next unimplemented slice from .iteration/goal.md, design it, write code+tests, commit and open a PR."
    success_criterion: "all tasks in .iteration/goal.md marked done"
    stagnation_threshold: 5
    self_evolve: true
    automation_level: auto
    prompt_skill: prd-implement
    iter_added: 1
    task_id: "auto-routines-auto-routines-prd-implement"
    last_outcome_summary: ""
    stats:
      runs: 0
      useful: 0
      noisy: 0
      last_useful_iter: null

  - id: commit-tests
    state: ACTIVE
    enabled: true
    primitive: git-hook
    est_minutes: 5  # est cost when surfaced as gha; git-hook itself runs locally
    trigger:
      human: "on every git commit"
    purpose: "Run pytest after every commit; if it fails, open a fix PR."
    success_criterion: "all tests green for 50 consecutive commits"
    stagnation_threshold: 7
    self_evolve: false
    automation_level: auto
    prompt_skill: commit-tests
    iter_added: 1
    task_id: ""
    last_outcome_summary: ""
    stats:
      runs: 0
      useful: 0
      noisy: 0
      last_useful_iter: null

  - id: commit-lint
    state: ACTIVE
    enabled: true
    primitive: git-hook
    est_minutes: 5
    trigger:
      human: "on every git commit"
    purpose: "Run linters after every commit; auto-fix and PR when violations exist."
    success_criterion: "0 lint violations in last 20 commits"
    stagnation_threshold: 7
    self_evolve: false
    automation_level: auto
    prompt_skill: commit-lint
    iter_added: 1
    task_id: ""
    last_outcome_summary: ""
    stats:
      runs: 0
      useful: 0
      noisy: 0
      last_useful_iter: null

  - id: session-doc-drift
    state: ACTIVE
    enabled: true
    primitive: scheduled
    execution_surface: local
    est_minutes: 5
    trigger:
      cron: "0 17 * * 1"
      human: "5:00 PM Mondays"
    purpose: "Weekly, update README/SKILL.md/catalog when they diverge from code."
    success_criterion: "docs in sync with code for 7 consecutive sessions"
    stagnation_threshold: 7
    self_evolve: true
    automation_level: auto
    prompt_skill: session-doc-drift
    iter_added: 1
    task_id: "auto-routines-auto-routines-session-doc-drift"
    last_outcome_summary: ""
    stats:
      runs: 0
      useful: 0
      noisy: 0
      last_useful_iter: null

  - id: meta-evolve
    state: ACTIVE
    enabled: true
    primitive: git-hook
    est_minutes: 5
    trigger:
      human: "on every commit that touches .iteration/goal.md"
    path_filters:
      - .iteration/goal.md
    purpose: "When .iteration/goal.md changes, re-plan the iteration's task list and commit the new breakdown."
    success_criterion: "tasks.md regenerated within 1 fire of every goal.md edit"
    stagnation_threshold: 5
    self_evolve: false
    automation_level: auto
    prompt_skill: meta-evolve
    iter_added: 1
    task_id: ""
    last_outcome_summary: ""
    stats:
      runs: 0
      useful: 0
      noisy: 0
      last_useful_iter: null

  - id: daily-digest
    state: ACTIVE
    enabled: true
    primitive: scheduled
    execution_surface: local
    est_minutes: 5
    trigger:
      cron: "0 18 * * *"
      human: "6:00 PM daily"
    purpose: "Summarize today's commits, PRs, and routine activity into .iteration/digests/."
    success_criterion: ""
    stagnation_threshold: 14
    self_evolve: false
    automation_level: auto
    prompt_skill: daily-digest
    iter_added: 1
    task_id: "auto-routines-auto-routines-daily-digest"
    last_outcome_summary: ""
    stats:
      runs: 0
      useful: 0
      noisy: 0
      last_useful_iter: null

neutralized_tasks: []

pending_evolve_requests: []

meta:
  cron: "0 9 * * *"
  human: "9:00 AM daily"
  task_id: "auto-routines-auto-routines-meta"
  last_run: null
  anti_flap_window: 3
  default_stagnation_threshold: 5
  process_evolve_requests: true
  budget: medium  # see SKILL.md "Budget → cadence presets"
  # PRD #10 Module 5 — schema-4 dials. Defaults preserve v3 behavior:
  # idle_window 'always' = no gating (cron fires whenever it says).
  # All routines default to execution_surface 'local', so the cost cap
  # only matters once a routine is flipped to 'gha'.
  idle_window: "always"
  gha_minutes_cap: 60
  kill_switch: false
