# .iteration/config.yaml
# Schema for the active routine set. Managed by the auto-routines skill.
# Edit by hand if you want; the next `evolve` run will respect manual edits
# (and may overwrite them — record reasons in history/iter-NNN.md).

schema_version: 3
repo_slug: "example-repo"
goal: "<one sentence — what this project is trying to be>"
mode: goal-driven              # goal-driven | fully-auto
created_at: "2026-05-09T00:00:00Z"
last_iter: 1

deps:
  gh: required                 # required | optional | none
  mcps:
    - scheduled-tasks

# Routines registry. Each routine has a stable id (kebab-case, no double-hyphens)
# and a finite-state-machine `state`.
#
#   PROPOSED   shown in interview, not yet confirmed
#   ACTIVE     installed and firing on schedule
#   EVOLVING   meta-agent currently re-evaluating it (transient)
#   STAGNANT   N runs without incremental work — paused (re-openable)
#   COMPLETED  success_criterion met — paused (re-openable)
#   STOPPED    user-disabled or meta-removed — neutralized (terminal)
routines:
  - id: pr-ci-watcher
    state: ACTIVE
    enabled: true
    primitive: scheduled         # scheduled | hook | git-hook | loop | pr-poll
    trigger:
      cron: "*/30 * * * *"       # canonical, machine-readable
      human: "every 30 minutes"  # source of truth in the interview UI
    purpose: "Comment on open PRs when CI fails or passes; suggest fixes."
    success_criterion: ""        # optional; meta verifies and transitions to COMPLETED
    stagnation_threshold: 7      # consecutive runs with stats.useful flat → STAGNANT
    self_evolve: true            # routine may file mid-run /evolve requests
    automation_level: auto       # off | notify | suggest | auto
    prompt_skill: pr-ci-watcher
    iter_added: 1
    task_id: ""                  # filled after MCP create
    last_outcome_summary: ""
    stats:
      runs: 0
      useful: 0
      noisy: 0
      last_useful_iter: null     # used for stagnation detection

  - id: daily-digest
    state: ACTIVE
    enabled: true
    primitive: scheduled
    trigger:
      cron: "0 18 * * *"
      human: "6:00 PM daily"
    purpose: "Summarize today's commits and PRs into .iteration/digests/."
    success_criterion: ""
    stagnation_threshold: 7
    self_evolve: true
    automation_level: auto
    prompt_skill: daily-digest
    iter_added: 1
    task_id: ""

# Tasks neutralized because the scheduled-tasks MCP has no delete verb.
neutralized_tasks: []

# Pending mid-run evolve requests. Routines append to .iteration/evolve_requests.jsonl
# at runtime; the meta-routine drains and processes them.
# (This list is informational mirror; the JSONL is the source of truth.)
pending_evolve_requests: []

# The meta-routine — the daily evolve. Installed by `init` and required.
meta:
  cron: "0 9 * * *"              # 9:00 AM daily
  human: "9:00 AM daily"
  task_id: ""
  last_run: null
  anti_flap_window: 7
  default_stagnation_threshold: 7
  process_evolve_requests: true  # drain .iteration/evolve_requests.jsonl on each fire
  # Token frugality cap on rendered per-routine SKILL.md. The shared
  # preamble lives at `.claude/skills/_shared/preamble.md` and is cached
  # across fires; per-routine SKILLs should stay small so cold reads
  # don't blow the context budget. A routine with a genuinely large
  # prompt_body may opt out via `routines[].max_skill_bytes`.
  max_routine_skill_bytes: 3000
