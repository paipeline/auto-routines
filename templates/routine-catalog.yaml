# templates/routine-catalog.yaml
#
# Archetype catalog for auto-routines. The skill picks archetypes during the
# interview based on detected stack and user goals, and uses these as the
# starting point for routine_prompt_body — concrete instructions that tell
# the routine to *write code, commit, and open PRs*, not just print findings.
#
# Each archetype contains:
#   id:                  default routine id (kebab-case)
#   purpose:             one-line summary
#   primitive:           hook | scheduled | git-hook | pr-poll | loop
#   category:            reactive | forward-driving
#                        - reactive:        responds to an event (commit, PR
#                                           merge, file edit, session end,
#                                           end-of-day timer). Maintenance
#                                           lane.
#                        - forward-driving: proactively pushes the project
#                                           ahead (drives PRD/roadmap, audits
#                                           deps, proposes upgrades). Progress
#                                           lane.
#                        The interview groups candidates by category so the
#                        user picks "what should react?" and "what should
#                        push forward?" separately.
#   trigger_default:     human-readable schedule (mapped to cron at install)
#   automation_default:  off | notify | suggest | auto
#   self_evolve:         true|false — whether this archetype should fire mid-run evolve
#   success_criterion:   template (with {{placeholders}} the interview may fill)
#   stack_hints:         list of detection signals that suggest this routine
#   prompt_body: |       the instructions Claude follows when the routine fires.
#                        These MUST tell the routine to actually do work
#                        (write code, run commands, commit, open PRs) —
#                        not just analyze.
#   shell_variant:       optional path to a pure-shell script that produces
#                        the same artifact with zero Claude tokens. When set,
#                        the prompt_body branches on `meta.budget`: `low` and
#                        `medium` dispatch the shell variant directly; `high`
#                        and `custom` run the full LLM flow. Used by
#                        `daily-digest` (see PRD .iteration/goal.md — Token
#                        frugality block).
#
# IMPORTANT: every prompt_body ends by telling the routine to commit on
# `routines/<id>` and open a PR if `automation_level: auto`. Never push to main.
#
# -----------------------------------------------------------------------------
# Archetype categories at a glance
# -----------------------------------------------------------------------------
# The interview reads this block to group candidates into two questions —
# "what should react?" and "what should push the project forward?" — instead
# of dumping the full catalog as one flat list. Keep this list in sync with
# the per-archetype `category:` field; a test pins that drift fails CI.
#
# reactive (maintenance lane — fires in response to an event):
#   - commit-tests           run/fix tests after each commit
#   - commit-lint            lint+autofix on each commit
#   - session-test-gap       end-of-session coverage gap sweep
#   - session-doc-drift      end-of-session doc/code drift sweep
#   - pr-ci-watcher          react to CI failures on open PRs
#   - daily-digest           daily summary of commits + PR activity
#   - meta-evolve            re-tune cadences/budgets from observed signals
#   - pr-review-bot          inline review on open PR diffs
#   - llm-ci-verifier        criteria-bound LLM verifier on open PRs
#   - coverage-watcher       react to coverage regressions
#   - secret-scan            block PR merge on leaked credentials
#   - db-security-watcher    flag risky migrations / SQL patterns on commit
#   - release-tag-checker    cut/check release tags after a merge
#
# forward-driving (progress lane — proactively advances the project):
#   - prd-implement          implement the next PRD slice
#   - weekly-dep-audit       propose dependency upgrades
#
# Adding a new archetype? Set the `category:` field on the archetype below,
# add the id to the matching bucket above, and the at-a-glance test stays
# green.

# Harness presets — stack → canonical archetype set (issue #78).
# Used by `auto-routines detect-harness [--apply]` to skip the
# interview when the repo's stack is unambiguous. Without `--apply`
# the subcommand prints the proposed set; with `--apply` it writes
# `.iteration/config.yaml` non-interactively.
#
# Each preset declares:
#   stack_hints: filesystem signals that indicate this stack
#                (paths checked relative to the repo root)
#   archetypes:  the archetype ids to install — must exist below in
#                the `archetypes:` list. The drift-detector test
#                `tests/test_harness_presets.py` pins this.
#
# Detection is precedence-ordered (first match wins). Order matters:
# python-pytest before plain-python so a repo with both `pytest` and
# `pyproject.toml` doesn't double-match.
harness_presets:
  - id: python-pytest
    name: "Python (pytest)"
    stack_hints:
      - pytest.ini
      - pyproject.toml
      - tests/
    archetypes:
      - commit-tests
      - commit-lint
      - secret-scan
      - coverage-watcher
      - prd-implement
      - meta-evolve

  - id: node-jest
    name: "Node.js (Jest)"
    stack_hints:
      - package.json
      - jest.config.js
      - jest.config.ts
    archetypes:
      - commit-tests
      - commit-lint
      - secret-scan
      - prd-implement
      - meta-evolve

  - id: go
    name: "Go"
    stack_hints:
      - go.mod
      - go.sum
    archetypes:
      - commit-tests
      - commit-lint
      - secret-scan
      - prd-implement
      - meta-evolve

archetypes:

  - id: prd-implement
    purpose: "On a schedule, pick the next unimplemented slice from the PRD/goal, design it, write code+tests, commit and open a PR."
    primitive: scheduled
    category: forward-driving
    trigger_default: "every 4 hours"
    automation_default: auto
    self_evolve: true
    success_criterion: "all tasks in .iteration/goal.md marked done"
    # This is the "drive the project forward" archetype. It's always
    # proposed in goal-driven mode regardless of stack hints — the hints
    # below cover repos that already keep a goal/PRD/roadmap on disk.
    stack_hints: [goal.md, prd.md, roadmap.md, spec.md, ROADMAP.md, GOAL.md]
    prompt_body: |
      You are the **implementer**. Your job is to push the project forward
      by exactly one concrete slice per fire. You read the goal document,
      decide the next smallest valuable unit of work, write the code AND
      the tests, and ship a PR. You DO NOT plan-only. You DO NOT print
      findings. You write code.

      1. Read the goal:
         - `.iteration/goal.md` is the canonical PRD/roadmap. Required.
           If missing, log `outcome: err, summary: "no goal at .iteration/goal.md"` and exit.
         - `.iteration/tasks.md` if present (cached task breakdown from a
           previous fire — incrementally updated, not authoritative).
      2. Read completion state:
         - `git log --oneline` since your `last_fire_sha`.
         - Open and merged PRs from this routine:
           `gh pr list --state all --search "head:routines/prd-implement" --limit 20`.
         - Tasks already crossed off in `.iteration/tasks.md`.
      3. Plan ahead — pick the next slice:
         - Smallest unit that delivers user-visible value (one endpoint,
           one component, one config option, one PRD bullet).
         - Skip anything with an open `routines/prd-implement` PR not yet
           merged — don't double-implement.
         - If `.iteration/tasks.md` does not exist, derive 5–10 ordered
           tasks from the goal document and write the file as your first
           output of this fire, then pick task #1.
         - If every task is done, log
           `outcome: ok, summary: "PRD complete", increment_signal: false`
           — the meta-agent will transition you to COMPLETED.
      4. Design briefly (in your head — do NOT write a design doc):
         - What files to touch.
         - What tests to add (TDD: red → green → refactor).
         - What the user-visible change is.
      5. Implement:
         - Write the failing test(s) FIRST. Run them. Confirm they fail
           for the right reason.
         - Write the minimum code to make them pass. Run again — green.
         - Run the full test suite. If anything else broke, fix it before
           continuing. Never commit broken tests as green.
         - Hard cap: 30 minutes total. If you hit the cap, commit what
           you have with a `WIP:` prefix and a TODO checklist in the PR.
      6. Commit + PR:
         - Branch: `git checkout -B routines/prd-implement`.
         - Commit with conventional message
           (`feat:` / `fix:` / `refactor:` — one commit per logical change).
         - Push: `git push -u origin routines/prd-implement --force-with-lease`.
         - Open PR via `python3 scripts/orchestrator.py open-pr
           --head routines/prd-implement --title '<conventional-commit
           summary>' --body '<what was built, why this slice next, PRD
           section by line number, test results, screenshots if UI>'`.
           The wrapper auto-resolves `--base` from origin's default branch.
      7. Update `.iteration/tasks.md`:
         - Mark the slice you implemented as `[x] done — <PR url>`.
         - Commit the tasks update on the same branch (separate commit).
      8. Log to `.iteration/log.jsonl`:
         - `outcome: ok, increment_signal: true, summary: "<PR url> — <slice title>"`
         - Set `increment_signal: false` only if you produced no diff
           (e.g. PRD was complete or every candidate slice was blocked).
      9. Hard rules:
         - Never push to main. Never amend others' commits.
         - One PR per fire — never bundle multiple slices.
         - If you cannot decide what's next, ask via
           `.iteration/evolve_requests.jsonl` (append a request with
           `reason: "ambiguous next slice"`) — do not guess.

  - id: commit-tests
    purpose: "Run the test suite after every commit; if anything fails, open a fix PR."
    primitive: git-hook
    category: reactive
    trigger_default: "on every git commit"
    automation_default: auto
    self_evolve: false
    success_criterion: "all tests green for 50 consecutive commits"
    stack_hints: [pytest, jest, mocha, go-test, cargo-test, rspec]
    prompt_body: |
      The user just committed. Your job:

      0. **Relevance gates — skip when CI would catch it anyway.**
         Most repos already run pytest on push via CI (`.github/workflows/ci.yml`
         or equivalent). This routine earns its keep by being a *fast local
         feedback loop on real code changes* — not by duplicating CI on every
         commit. Apply these gates BEFORE running anything:

         a. **WIP commits.** If the HEAD commit message matches
            `^[Ww][Ii][Pp]\b` or `^wip:` (i.e. the user explicitly marked it
            mid-flow), log `outcome: noop, increment_signal: false,
            summary: "skipped — WIP commit"` and exit. The user does not want
            pytest noise on a checkpoint they already labeled incomplete.

         b. **Docs-only commits.** Run `git show HEAD --name-only --pretty=format:`
            and check the changed files. If every changed path matches
            `*.md`, lives under `docs/`, or is otherwise non-source
            (e.g. `LICENSE`, `*.txt`, `*.rst`, `*.adoc`, image assets,
            `.gitignore`), log `outcome: noop, increment_signal: false,
            summary: "skipped — docs-only commit (N files)"` and exit.
            Pytest cannot fail on prose changes; CI catches anything else.

         These gates exist *because* of CI overlap, not in spite of it.
         Without them this routine burns minutes re-testing every README
         tweak. Do not remove them without revisiting PRD #10 OQ5.

      1. Detect the test runner from the repo (package.json scripts.test,
         pyproject.toml [tool.pytest], Cargo.toml, go.mod, Gemfile, etc.).
      2. Run it with a 5-minute timeout. Capture stdout+stderr.
      3. If exit code is 0:
         a. **Coverage-gap fill — the value-add over CI.** CI already proves
            tests pass; this routine earns its minutes by closing diff
            coverage gaps. Run the test suite with coverage measurement
            (`pytest --cov=. --cov-report=term-missing`, `jest --coverage`,
            `go test -cover`, `cargo tarpaulin`, etc.). Compare against
            the just-committed diff: which lines added in HEAD are NOT
            covered by any test? Use `git diff HEAD~1 HEAD --unified=0`
            to enumerate the new lines, then intersect with the coverage
            tool's missed-lines report.
         b. If every new line is covered: log `outcome: ok,
            increment_signal: false, summary: "diff fully covered"` and exit.
         c. If there are uncovered new lines, pick the 1–3 most behavior-
            critical functions touched (those with branches, side effects,
            or external I/O — same heuristic as `session-test-gap`). Write
            tests that exercise the happy path + one failure path. Match
            the project's existing test style.
         d. Run the new tests; iterate until green and the previously
            uncovered lines are now covered.
         e. Create branch `routines/commit-tests`, commit with message
            `test: cover diff from <short SHA>` listing which functions
            were newly tested.
         f. Open a PR via `python3 scripts/orchestrator.py open-pr
            --head routines/commit-tests --title 'test: cover diff from
            <short SHA>' --body '<list of newly-tested functions, coverage
            delta, link to triggering commit>'`. The wrapper auto-resolves
            `--base` from origin's default branch.
         g. Log `outcome: ok, increment_signal: true, summary: <PR url>`.
         h. Hard cap: 15 minutes for the gap-fill phase. If you hit the
            cap with partial coverage, commit what you have with a TODO
            checklist in the PR body for the rest. Better partial than
            nothing.
      4. If exit code is non-zero:
         a. Read the failing test output and the diff of the just-committed change
            (`git show HEAD --stat` and `git show HEAD -- <changed files>`).
         b. Identify the root cause. If it's a clear regression in the committed
            change, write the minimum fix. If it's a flaky test, add `@pytest.mark.flaky`
            (or framework equivalent) only when you can show 3-of-5 runs pass.
         c. Create branch `routines/commit-tests`, commit your fix with message
            `fix(tests): <one-line summary>` referencing the original commit SHA.
         d. Open a PR with `python3 scripts/orchestrator.py open-pr
            --head routines/commit-tests --title 'fix(tests): <summary>'
            --body '<failing test output, root cause, link to triggering
            commit>'`. The wrapper auto-resolves `--base` from origin's
            default branch.
         e. Log `outcome: ok, increment_signal: true, summary: <PR url>`.
      5. Never push to main. Never amend the user's commit.

  - id: commit-lint
    purpose: "Run linter+formatter after every commit; auto-fix and PR when violations exist."
    primitive: git-hook
    category: reactive
    trigger_default: "on every git commit"
    automation_default: auto
    self_evolve: false
    success_criterion: "0 lint violations in last 20 commits"
    stack_hints: [ruff, eslint, mypy, prettier, rubocop, gofmt, clippy]
    prompt_body: |
      The user just committed. Your job:

      1. Detect available linters/formatters (ruff, eslint, mypy, prettier, gofmt,
         clippy, rubocop). Skip any not present.
      2. Run each in --fix mode (or formatter equivalent). If anything changed:
         a. Verify the changes are pure formatting/style — no semantic edits.
            If the linter wants a behavior change (e.g. ruff's `B008`), DO NOT
            apply it; only flag.
         b. Branch: `routines/commit-lint`. Commit with message
            `style: auto-fix lint violations from <short SHA>`.
         c. Open PR via `python3 scripts/orchestrator.py open-pr
            --head routines/commit-lint --title 'style: auto-fix lint
            violations from <short SHA>' --body '<which tools fired, which
            files changed>'`. The wrapper auto-resolves `--base` from
            origin's default branch.
         d. Log `outcome: ok, increment_signal: true, summary: <PR url>`.
      3. Run remaining linters in check-only mode for issues that can't be
         auto-fixed. If any errors remain, open a separate PR with TODO comments
         placed at violation sites and a checklist.
      4. If everything was already clean, log `outcome: ok, increment_signal: false`.

  - id: session-test-gap
    purpose: "After each Claude session, find untested new code and write the tests."
    primitive: hook
    category: reactive
    trigger_default: "Stop hook (end of every Claude session)"
    automation_default: auto
    self_evolve: true
    success_criterion: "test coverage of files touched this session ≥ 80%"
    stack_hints: [pytest, jest, mocha, go-test]
    prompt_body: |
      The Claude session just ended. Your job:

      1. List files touched in the session (`git diff --name-only <session-start-sha>..HEAD`
         where session-start-sha is recorded in .iteration/session.json — if missing,
         use the last 10 commits).
      2. For each touched source file, look up its corresponding test file. If a
         file has no test file, OR has uncovered functions (use coverage tooling
         when available — `pytest --cov`, `jest --coverage`), proceed.
      3. For each gap:
         a. Read the source. Pick the 1-3 most behavior-critical functions
            (those with branches, side effects, or external I/O).
         b. Write tests that exercise the happy path + at least one failure path.
            Match the project's existing test style (read 3 existing test files
            first to learn the conventions).
         c. Run the new tests; iterate until green.
      4. If you wrote any tests:
         a. Branch: `routines/session-test-gap`. Commit with message
            `test: cover untested functions in <files>`.
         b. PR body: list each function tested, the coverage delta, why each
            test matters.
         c. Log `outcome: ok, increment_signal: true, summary: <PR url>`.
      5. If no gaps found, log `outcome: ok, increment_signal: false`.
      6. Hard cap: 30 minutes total. If you hit the cap, commit what you have
         with a TODO list in the PR body for the rest.

  - id: session-doc-drift
    purpose: "After each Claude session, update README/docs that diverge from the code."
    primitive: hook
    category: reactive
    trigger_default: "Stop hook (end of every Claude session)"
    automation_default: auto
    self_evolve: true
    success_criterion: "README in sync with code for 7 consecutive sessions"
    stack_hints: [readme, mkdocs, sphinx]
    prompt_body: |
      The Claude session just ended. Your job:

      1. Identify "documented surface" files: README.md, docs/**, plus any
         file in `.iteration/config.yaml > docs.tracked_paths` if present.
      2. Identify "documented things":
         - CLI commands shown in README → check they exist and produce the
           shown output (run them with --help, diff against the README).
         - API endpoints / function signatures → grep code for the signature,
           confirm it matches.
         - Install steps → verify each command is still in package.json /
           pyproject.toml / Makefile.
      3. For each drift:
         a. Update the doc to match code. Never update code to match docs
            (that's the user's job — flag those instead).
         b. If the README references a feature that was deleted, remove the
            reference and note it in the PR body.
      4. If you changed any doc:
         a. Branch: `routines/session-doc-drift`. Commit with message
            `docs: sync README with code (<short summary>)`.
         b. PR body: bullet list of each drift fixed, with file:line refs.
         c. Log `outcome: ok, increment_signal: true, summary: <PR url>`.
      5. If no drift, log `outcome: ok, increment_signal: false`.

  - id: pr-ci-watcher
    purpose: "Comment on open PRs when CI flips red, with the failing line and a fix proposal."
    primitive: scheduled
    category: reactive
    trigger_default: "every 30 minutes"
    automation_default: auto
    self_evolve: true
    success_criterion: "CI green on last 50 PRs"
    stack_hints: [github-actions, gitlab-ci, circleci]
    prompt_body: |
      Your job: keep PR authors informed about CI failures, fast.

      1. List open PRs: `gh pr list --state open --limit 30 --json number,title,statusCheckRollup,headRefName`.
      2. For each PR with a failing check that this routine has not commented
         on yet (track via .iteration/pr-watch-state.json):
         a. Fetch the failing check's logs: `gh run view <run-id> --log-failed`.
         b. Identify the failing test or build step. Extract the smallest
            relevant excerpt (≤ 30 lines).
         c. Read the PR diff for the file the failure points at.
         d. If the cause is obvious in the diff: post a PR comment with the
            log excerpt, the line in the diff, and a one-line fix suggestion.
         e. If the failure looks like a flake: do not comment yet. Re-check
            on the next fire — if still failing, then comment.
      3. If a PR has gone green after a previous failure comment from this
         routine, post a one-line "✓ CI green now" reply.
      4. Update `.iteration/pr-watch-state.json` with PR numbers + last
         commented-on check id, so we don't double-comment.
      5. Log per-PR outcomes to `.iteration/log.jsonl`. `increment_signal: true`
         if you posted any comment.

  - id: daily-digest
    purpose: "Summarize today's commits and PRs into .iteration/digests/."
    primitive: scheduled
    category: reactive
    trigger_default: "6:00 PM daily"
    automation_default: auto
    self_evolve: false
    success_criterion: ""
    stack_hints: []
    shell_variant: scripts/daily-digest.sh
    prompt_body: |
      Write a one-page digest of today's repo activity.

      0. Budget check (token-frugality path, PRD goal.md):
         - Read `meta.budget` from `.iteration/config.yaml`.
         - If `meta.budget` is `low` or `medium`:
             - Run `bash scripts/daily-digest.sh "00:00 today" > .iteration/digests/$(date +%Y-%m-%d).md`.
             - Commit the digest on `routines/daily-digest`. Then open a
               PR via `python3 scripts/orchestrator.py open-pr
               --head routines/daily-digest --title 'chore(digest):
               <YYYY-MM-DD> daily digest' --body '<digest body — top
               commits, PR activity, routine outcomes>'` (or push
               directly to main if `config.yaml > daily_digest.push_direct:
               true`). The wrapper auto-resolves `--base` from origin's
               default branch.
             - Log outcome with `increment_signal: true` and EXIT — do not
               run the LLM flow below. The whole point of low/medium is
               zero Claude tokens for the digest body.
         - If `meta.budget` is `high` or `custom`: continue with the LLM flow.

      1. Gather:
         - `git log --since="00:00 today" --pretty=format:"%h %s (%an)"`
         - `gh pr list --state all --search "updated:>$(date -u -v-1d +%Y-%m-%dT%H:%M:%SZ)"`
         - Tail of `.iteration/log.jsonl` since 00:00.
      2. Write `.iteration/digests/<YYYY-MM-DD>.md` with sections:
         ## Commits   — bullet list with one-line context
         ## PRs       — opened, merged, still-open-failing
         ## Routines  — what fired, what was useful, what was noisy
         ## Tomorrow  — top 3 things blocking progress (your judgment)
      3. Commit the digest on branch `routines/daily-digest`. Then open a
         PR via `python3 scripts/orchestrator.py open-pr
         --head routines/daily-digest --title 'chore(digest): <YYYY-MM-DD>
         daily digest' --body '<digest body — summarize the four sections
         above>'` (or push directly to main if
         `config.yaml > daily_digest.push_direct: true`). The wrapper
         auto-resolves `--base` from origin's default branch.
      4. Log outcome with `increment_signal: true` if there was any activity
         today, false on empty days.

  - id: weekly-dep-audit
    purpose: "Audit dependencies for known vulnerabilities and outdated majors."
    primitive: scheduled
    category: forward-driving
    trigger_default: "9:00 AM Mondays"
    automation_default: auto
    self_evolve: true
    success_criterion: "0 high/critical vulnerabilities for 4 consecutive runs"
    stack_hints: [package.json, pyproject.toml, Cargo.toml, go.mod]
    prompt_body: |
      Audit dependencies. Your job:

      1. Detect package manager. Run the appropriate audit:
         - npm/pnpm/yarn: `<pm> audit --json`
         - pip: `pip-audit --format json` (install if missing)
         - cargo: `cargo audit --json`
         - go: `govulncheck ./... -json`
      2. Parse vulnerabilities. Group by severity (critical, high, medium, low).
      3. For critical+high:
         a. Read the advisory. Determine if a non-breaking patch version exists.
         b. If yes: bump the version in the manifest. Run tests. If green,
            branch `routines/weekly-dep-audit`, commit, then open a PR via
            `python3 scripts/orchestrator.py open-pr
            --head routines/weekly-dep-audit --title 'fix(deps): bump
            <package> to <version> (<severity> advisory)' --body '<advisory
            link, affected packages, test results>'`. The wrapper
            auto-resolves `--base` from origin's default branch.
         c. If no (requires major bump): write a TODO file under
            `.iteration/proposals/dep-audit-<date>.md` with the affected
            packages, severity, and migration notes. Do not auto-bump majors.
      4. For medium/low: append to `.iteration/dep-audit-backlog.md` for the
         user to schedule.
      5. Log `increment_signal: true` if you opened a PR or wrote a proposal.

  - id: meta-evolve
    purpose: "When .iteration/goal.md changes, re-plan the iteration's task list and commit the new breakdown."
    primitive: git-hook
    category: reactive
    trigger_default: "on every commit that touches .iteration/goal.md"
    automation_default: auto
    self_evolve: false
    success_criterion: "tasks.md regenerated within 1 fire of every goal.md edit"
    # path_filters is consumed by orchestrator.match_trigger (PRD #10
    # priority rule 4): when the trigger reports a goal.md change in the
    # commit's diff, the matcher returns ONLY routines whose path_filters
    # match — meta-evolve fires alone, commit-tests/commit-lint sit out.
    path_filters:
      - .iteration/goal.md
    stack_hints: [goal.md, prd.md, roadmap.md, ROADMAP.md]
    prompt_body: |
      The user just edited the iteration goal. Your job is to re-plan the
      task list so prd-implement (and any other goal-consuming routine)
      sees the new shape on its next fire. You write the rewritten tasks
      AND commit them — never analysis-only.

      1. Read the new goal:
         - `.iteration/goal.md` is the canonical PRD/roadmap. Required.
           If missing, log `outcome: err, summary: "no goal at .iteration/goal.md"`
           and exit.
         - `git show HEAD -- .iteration/goal.md` to see exactly what
           changed in the triggering commit.
      2. Read the prior task breakdown (if any):
         - `.iteration/tasks.md` — the cached ordered task list other
           routines consume. May not exist on first fire.
      3. Decide what changed at the slice level:
         - Which existing tasks are now obsolete (goal removed them)?
         - Which existing tasks survive but need re-wording?
         - Which new tasks does the goal imply that aren't on the list?
         - For each "in progress" task (referenced by an open
           `routines/prd-implement` PR — `gh pr list --state open
           --search "head:routines/prd-implement"`), preserve it; do NOT
           rip out work in flight.
      4. Rewrite `.iteration/tasks.md`:
         - 5–15 ordered tasks, smallest valuable unit first.
         - Each task: one line, imperative ("add X", "extract Y", "test Z").
         - Keep tasks already crossed off as `- [x]`; preserve their
           ordering at the top.
         - New tasks go at the bottom in dependency order.
      5. Commit + PR:
         - Branch: `git checkout -B routines/meta-evolve`.
         - Commit with message
           `chore(plan): re-plan tasks after goal.md change at <short SHA>`.
         - Push and open a PR via `python3 scripts/orchestrator.py open-pr
           --head routines/meta-evolve --title 'chore(plan): re-plan tasks
           after goal.md change at <short SHA>' --body '<what changed in
           goal.md, tasks added, tasks removed, tasks reworded>'`. The
           wrapper auto-resolves `--base` from origin's default branch.
         - Hard cap: 10 minutes. If you can't make sense of the new
           goal, commit a minimal rewrite with TODO markers and a
           `WIP:` prefix; the next prd-implement fire will refine.
      6. Log:
         - `increment_signal: true` if tasks.md actually changed.
         - `increment_signal: false` if you concluded the existing
           breakdown still matches the new goal (rare but possible).

  - id: pr-review-bot
    purpose: "Post inline review comments on open PRs: style, obvious bugs, security smells."
    primitive: scheduled
    category: reactive
    trigger_default: "every 30 minutes"
    automation_default: auto
    self_evolve: false
    success_criterion: "every open PR ≥ 6h old has at least one review comment from this routine"
    stack_hints: [.github, CODEOWNERS, .eslintrc, ruff.toml, pyproject.toml]
    prompt_body: |
      Your job: act as a fast-feedback reviewer on open PRs. Read the
      diff, drop **inline** review comments (line-anchored, not a
      summary block) on the three axes the user asked for:

        1. **Style** — naming, dead code, copy-paste, function length,
           inconsistent patterns with the rest of the file/module.
        2. **Obvious bugs** — null/None dereferences, off-by-one,
           unhandled exceptions, missing await, wrong loop variable,
           mutation of a function default arg, type confusion.
        3. **Security smells** — SQL/shell concatenation, hard-coded
           URLs that should be config, missing auth checks on a new
           endpoint, unsafe deserialization (`eval`, `pickle.loads`,
           `yaml.load` without `Loader=`).

      Differs from `pr-ci-watcher` (only reacts to CI failures) and
      `secret-scan` (only checks for credential leaks): this routine
      reviews the diff *itself*. Stay out of merge gating — review
      comments are advisory; don't request changes or block the PR.

      Workflow:

      1. List open PRs eligible for review:
         `gh pr list --state open --limit 20 --json number,title,headRefOid,updatedAt`.
         Read `.iteration/pr-review-bot-state.json` to skip PRs whose
         `headRefOid` matches the last reviewed oid (no new commits).
         Limit to ~5 PRs per fire — quality over breadth.
      2. For each eligible PR:
         a. Fetch the diff: `gh pr diff <number>` plus
            `gh api repos/{owner}/{repo}/pulls/{number}/files`.
         b. Walk the *added* lines. For each finding, record:
            - file path
            - line number (in the new file, not the diff hunk header)
            - axis (style | bug | security)
            - one-sentence message
            - optional fix suggestion (single replacement line)
         c. Cap at 8 comments per PR — more than that and the author
            stops reading. Prioritize bug > security > style. Drop
            duplicates of the same finding within 5 adjacent lines.
         d. Post the comments via a single review request so they
            land atomically:
            `gh api repos/{owner}/{repo}/pulls/{number}/reviews
             -f event=COMMENT
             -f comments='[{"path":...,"line":...,"body":"..."}, ...]'`.
            Do NOT use `--request-changes` — this is advisory review.
      3. Update `.iteration/pr-review-bot-state.json` with the
         reviewed oid per PR so the next fire only sees new commits.
      4. If a PR has zero findings, post one summary comment "Reviewed
         — no comments." so the author knows the routine ran. Cap at
         once per PR head oid (don't re-post on every fire).
      5. Log per-PR outcomes to `.iteration/log.jsonl`. Use
         `increment_signal: true` when you posted any review comment
         (including the zero-findings summary).

      You do NOT branch or commit code from this routine — its real
      work is inline review comments on the PR.

      When in doubt about whether a finding is worth posting, **skip
      it**. Silent acceptance of borderline cases beats nitpick noise
      that trains the author to ignore the bot.

  - id: llm-ci-verifier
    purpose: "Verify open PRs against the acceptance criteria of their linked issue (or inline PR-body checklist); post one inline review comment per failed criterion, or a summary approval if all pass."
    primitive: pr-poll
    category: reactive
    trigger_default: "every 15 minutes"
    automation_default: auto
    self_evolve: false
    # Issue #76 structured predicate: success means 7 consecutive days
    # with no failed-criterion comments posted by this routine. The
    # evaluator scans .iteration/log.jsonl filtered to this routine_id.
    success_criterion:
      kind: no-failures-n-days
      args:
        days: 7
    # Empty hints — this archetype applies to any repo with PRs. The
    # interview proposes it regardless of language stack (issue #79).
    stack_hints: []
    prompt_body: |
      Your job: act as a criteria-bound CI verifier on open PRs.
      Where `pr-review-bot` does generic style/bug/security review,
      you bind review to the *intent* of the PR — the acceptance
      criteria the author committed to in the linked issue (or
      inline in the PR body itself).

      You differ from `pr-review-bot` (which reviews diffs for
      style/bug smells) and `pr-ci-watcher` (which only reacts to
      CI failures). You read the PR's *acceptance criteria*, walk
      the diff, and decide per-criterion: met / not met / unclear.

      Workflow:

      1. **List PRs needing verification.**
         `gh pr list --state open --limit 20 \
             --json number,title,body,headRefOid,updatedAt`.
         Read `.iteration/llm-ci-verifier-state.json` to skip PRs
         whose `headRefOid` matches the last verified oid (no new
         commits since your last fire). Cap at 5 PRs per fire —
         quality over breadth.

      2. **Extract acceptance criteria.** For each eligible PR:
         a. Read the PR body. If it contains a `## Acceptance
            criteria` section with `- [ ]` / `- [x]` checklist items,
            those are the criteria.
         b. Otherwise, look for `Closes #N` / `Fixes #N` links in
            the PR body. Fetch the linked issue:
            `gh issue view <N> --json body`. Find its
            `## Acceptance criteria` section.
         c. If neither yields a checklist, log
            `outcome: noop, summary: "no criteria found on PR #<N>",
            increment_signal: false` and skip this PR. **Do not**
            invent criteria from the PR title.

      3. **Verify the diff against each criterion.**
         a. Fetch the diff:
            `gh pr diff <number>` plus
            `gh api repos/{owner}/{repo}/pulls/{number}/files`.
         b. For each criterion, decide:
            - **met**: the diff demonstrably implements it (cite
              file:line so the comment links back to evidence).
            - **not met**: the diff does not implement it, or
              implements it incorrectly. Record file:line where
              the criterion *should* have landed (the nearest
              relevant function / module).
            - **unclear**: ambiguous criterion (e.g.
              "improve performance" with no target). Do not
              comment on these — they're not the routine's job
              to interpret.
         c. Cap at one comment per failed criterion. Never re-post
            the same criterion failure on subsequent fires for the
            same `headRefOid` — the state file is the dedup key.

      4. **Post inline review comments.**
         Use `gh api repos/{owner}/{repo}/pulls/{number}/reviews
            -f event=COMMENT
            -f comments='[{"path":...,"line":...,"body":"..."}, ...]'`
         so the comments land atomically as a single review. Each
         comment body starts with `[criterion #N]` and quotes the
         criterion text in italics, then explains what's missing
         in one sentence. **Never** use `event=REQUEST_CHANGES` —
         this is advisory review, not merge gating.
         **Never** auto-merge the PR even when every criterion
         passes — approval is the author's call, not yours.

      5. **Summary on full-green.** If every criterion is met and
         no `unclear` items remain, post a single review with
         `event=APPROVE` and a one-line body like
         `LLM CI: all 4 acceptance criteria met (advisory).`
         Approval is advisory — the human reviewer still owns the
         merge button.

      6. **Update state.**
         Write `.iteration/llm-ci-verifier-state.json` with
         `{<pr_number>: <headRefOid>}` for every PR you reviewed,
         so the next fire only re-verifies on new commits.

      7. **Log.** Append one line per PR processed to
         `.iteration/log.jsonl` with the canonical preamble shape:
         - `outcome: ok, increment_signal: true` when you posted
           any review (per-criterion comments or the summary
           approval).
         - `outcome: noop, increment_signal: false` when you
           skipped the PR (no criteria, no new commits).

      Hard rules:

      - You do NOT branch or commit code from this routine — your
        real work is review comments on the PR.
      - You do NOT request changes, request reviewers, or merge.
        This is advisory.
      - You do NOT comment on criteria marked `unclear` — surface
        them in the log line so the author can sharpen the
        criterion if they want, but don't nag.

  - id: coverage-watcher
    purpose: "Watch project test coverage and open a fix PR when it drops below threshold."
    primitive: scheduled
    category: reactive
    trigger_default: "every 6 hours"
    automation_default: auto
    self_evolve: false
    success_criterion: "coverage stays above configured threshold for 14 consecutive fires"
    stack_hints: [pyproject.toml, pytest.ini, jest.config.js, package.json, .coveragerc, tox.ini]
    prompt_body: |
      Your job: keep test coverage from sliding. When the metric drops
      below the configured threshold, push a real PR — either adding
      the missing tests (preferred) or, when the regression is too
      large to fix in one fire, opening a tracking PR with a concrete
      task list.

      1. Detect the stack and coverage tool:
         - Python: `pyproject.toml` or `.coveragerc` or `tox.ini` → use
           `coverage` / `pytest --cov`. Read threshold from
           `[tool.coverage.report] fail_under` or
           `config.yaml > coverage_watcher.threshold` (defaults to 80).
         - Node: `package.json` with jest config → use `jest --coverage`.
           Threshold from `jest.config.js > coverageThreshold.global.lines`
           or `config.yaml > coverage_watcher.threshold`.
         - Other: log `outcome: skip, reason: 'unsupported stack'` and exit.
      2. Run the coverage tool. Use a 5-minute hard cap; tools that hang
         get killed and logged as `outcome: err`.
      3. Compare current line coverage vs threshold:
         - At or above: log `outcome: ok, increment_signal: false` and exit.
         - Below: continue.
      4. Identify the gap:
         - Per-file coverage diff: which files dropped from last known
           good (cached in `.iteration/coverage-watcher-state.json`)?
         - Which uncovered lines are *new code* (added since the cached
           baseline, via `git log --diff-filter=A`)? Prioritize those —
           legacy uncovered code is its own backlog.
      5. Branch `routines/coverage-watcher`. Decide one of:
         a. **Fixable in one fire**: gap is ≤ 3 files, each ≤ ~30 lines
            uncovered. Write the tests, commit
            `test(<scope>): cover <module> back to threshold`, then open
            a PR via `python3 scripts/orchestrator.py open-pr
            --head routines/coverage-watcher --title 'Restore coverage to
            <pct>% (<gap_pct>% drop)' --body '<which files were newly
            covered, before/after pct, link to triggering commit>'`. The
            wrapper auto-resolves `--base` from origin's default branch.
         b. **Tracking PR**: gap is larger. Commit a single file
            `.iteration/coverage-watcher-todo.md` listing every
            uncovered new path with file:line, ordered by lines uncovered.
            Open a PR via `python3 scripts/orchestrator.py open-pr
            --head routines/coverage-watcher --title 'Coverage regression:
            <pct>% (threshold <thresh>%)' --body '<the task list from
            coverage-watcher-todo.md, ordered by lines uncovered>'`.
            Subsequent fires update the same file rather than opening
            duplicate PRs (keyed on branch `routines/coverage-watcher`).
      6. Update `.iteration/coverage-watcher-state.json` with the new
         baseline (current coverage pct, per-file pct map).
      7. Log outcome to `.iteration/log.jsonl`. `increment_signal: true`
         when you opened or updated a PR.

      Never lower the threshold to make the PR green — that's the
      classic anti-pattern this routine exists to prevent. If the user
      actually wants a lower threshold they'll edit
      `config.yaml > coverage_watcher.threshold` themselves.

  - id: secret-scan
    purpose: "Scan open PR diffs for leaked credentials; comment + block merge when found."
    primitive: scheduled
    category: reactive
    trigger_default: "every 15 minutes"
    automation_default: auto
    self_evolve: false
    success_criterion: "0 leaked secrets merged in last 30 PRs"
    stack_hints: [.env, .env.example, secrets.yaml, credentials.json, .gitignore]
    prompt_body: |
      Your job: catch credentials before they merge. Open PR diffs are
      the window — once merged to main, a leaked secret has to be
      revoked, rotated, and force-pushed out of history. Blocking at
      PR time is cheap; blocking at merge time is not.

      1. List open PRs updated since this routine's last fire:
         `gh pr list --state open --limit 30 --json number,headRefName,headRefOid,updatedAt`.
         Track `last_scanned_oid` per PR number in
         `.iteration/secret-scan-state.json` so re-scans only look at
         new commits.
      2. For each PR with new commits since the cached oid:
         a. Fetch the diff for the new commit range:
            `gh pr diff <number> --name-only` then for each file
            `gh api repos/{owner}/{repo}/pulls/{number}/files`.
         b. Scan the *added* lines (lines starting with `+` and not `+++`)
            for concrete leak patterns:
            - AWS keys:          `AKIA[0-9A-Z]{16}`, `aws_secret_access_key\s*=`
            - GitHub tokens:     `ghp_[A-Za-z0-9]{36}`, `gho_[A-Za-z0-9]{36}`
            - API key style:     `api[_-]?key\s*=\s*['"][A-Za-z0-9_\-]{20,}`
            - Generic passwords: `password\s*=\s*['"][^'"]{8,}['"]`
            - Private keys:      `-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----`
            - Stripe/Slack/etc:  `sk_live_[A-Za-z0-9]{24,}`, `xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]+`
            (Source the full pattern list from
            `.iteration/secret-scan-state.json:patterns` if present so
            users can extend it without editing this body.)
         c. Allow-list: if a file matches `.env.example` or has a
            `# secret-scan: allow` magic comment within 3 lines of the
            hit, skip it (intentional placeholder).
      3. If any leaks found in a PR:
         a. Post a PR comment listing each hit with file, line, and the
            redacted pattern name (NEVER repeat the credential value
            itself in the comment — that just doubles the leak).
         b. Set a failing review status on the PR so it blocks merge:
            `gh pr review <number> --request-changes --body "Secret-scan
            detected leaked credentials — see comment."`.
         c. Re-request review on every subsequent fire until the diff
            stops containing the leak (a forced-push or a removal
            commit clears the block automatically).
      4. If a previously-blocked PR is now clean (all hits removed):
         post one "✓ secret-scan clear" comment and approve the review
         block: `gh pr review <number> --approve --body "Secret-scan clear."`.
      5. Update `.iteration/secret-scan-state.json` with the latest
         scanned oid per PR.
      6. Log per-PR outcomes to `.iteration/log.jsonl`. Use
         `increment_signal: true` when you posted any comment or
         status check.

      You do NOT branch or commit code from this routine — its real
      work is the PR comment + failing review status. (The fix has to
      come from the PR author: remove the secret AND revoke it
      out-of-band. This routine cannot revoke an upstream credential,
      so the comment must instruct the author to do it.)

      Never echo a credential value back in a comment. Use the
      pattern name and file:line only.

  - id: db-security-watcher
    purpose: "On commits that touch migrations or SQL, scan the diff for risky patterns (DROP COLUMN without backfill, ALTER TYPE without USING, missing FK indexes, UPDATE/DELETE without WHERE, etc.) and report findings before they ship."
    primitive: git-hook
    category: reactive
    trigger_default: "on every commit that touches migration / SQL files"
    automation_default: notify
    self_evolve: false
    # Issue #76 structured predicate: 30 consecutive days with no
    # `outcome: err` from this routine. The evaluator scans
    # .iteration/log.jsonl filtered by routine_id.
    success_criterion:
      kind: no-failures-n-days
      args:
        days: 30
    # Path filters — same dispatch lane as commit-tests, but only
    # fires when the user actually touched a migration / schema /
    # SQL file. Without these filters the hook would noop on most
    # commits and waste cron seconds.
    path_filters:
      - migrations/**
      - "**/migrations/**"
      - "**/*.sql"
      - "**/schema.rb"
      - "**/schema.py"
      - "**/schema.sql"
      - db/migrate/**
      - prisma/migrations/**
      - alembic/versions/**
    # Stack hints cover the major migration tooling — Python
    # (alembic / sqlalchemy), Node (prisma / knex), Go (gorm), Rails
    # (`db/migrate`). The interview surfaces this archetype whenever
    # any of these are detected in the analysis step.
    stack_hints:
      - alembic
      - sqlalchemy
      - prisma
      - knex
      - gorm
      - migrations
      - db/migrate
    prompt_body: |
      The user just committed code that touches a migration or SQL
      file. Your job: scan the *added* lines of the diff for the
      risky-pattern catalog below, and log every finding to
      `.iteration/log.jsonl`. You do NOT rewrite the migration —
      `automation_level: notify` means find + log. The author
      decides whether to ship the migration anyway or refactor.

      0. **Diff-only scope.** Read the current commit's diff:
         `git diff HEAD~1..HEAD --unified=0 -- '*.sql'
             'migrations/**' '**/migrations/**' 'db/migrate/**'
             'prisma/migrations/**' 'alembic/versions/**'
             'schema.{rb,py,sql}'`.
         Full-file scans would flag every existing migration on
         every commit. The point is to catch NEW risk, not audit
         history.

      1. **Risky-pattern catalog.** For each pattern below, scan the
         added lines and record a finding (`pattern_id`, file:line,
         and the offending text):

         a. **`DROP COLUMN` without nullable-default backfill** —
            removing a column in a live system breaks readers that
            still reference it. Two-step deploys (deprecate → drop)
            are the standard fix.
         b. **`ALTER TYPE` / `ALTER COLUMN ... TYPE` without
            `USING`** — Postgres needs an explicit cast or the
            migration fails at run time (and may table-lock).
         c. **New foreign key without an explicit index on the
            referencing column** — FK lookups without an index
            cause sequential scans on every join.
         d. **`UPDATE` / `DELETE` without `WHERE`** — a missing
            `WHERE` clause is the classic "wiped the whole table"
            bug; flag every occurrence in migration files.
         e. **Migration that doesn't wrap its statements in a
            transaction** (`BEGIN; … COMMIT;` for raw SQL, or the
            framework's transactional-migration flag) — partial
            failures leave the schema in a torn state with no
            rollback.
         f. **`SELECT *` in production query files** (not
            migrations themselves — but if the commit touches a
            production query module, flag it). Star-selects bind
            the schema to every reader.
         g. **N+1 query patterns** — heuristic: a loop that calls
            a DB function (`session.query(...)`, `User.find(...)`,
            `prisma.*.findUnique(...)`) inside the loop body. One
            DB call per iteration scales linearly with N.

      2. **Decide severity.** Per finding, rate `high` (a-d) or
         `medium` (e-g). High findings block downstream `auto`
         routines (e.g. a release-tag-checker should not auto-tag
         when this fire produced any `high` finding in the same
         commit range — but enforcing that is the OTHER routine's
         job; you only emit the findings).

      3. **Write the findings report.**
         `.iteration/db-security-findings-<HEAD-sha>.md` — one file
         per commit, gitignored by convention. Format:
         ```
         # db-security-watcher findings
         Commit: <sha>
         Date: <iso8601 local>

         ## high
         - [a] DROP COLUMN without backfill — migrations/2026_05_11_drop_legacy.sql:7
           > ALTER TABLE users DROP COLUMN legacy_id;
           Two-step deploy: deprecate the column first, then drop in a follow-up.

         ## medium
         - [f] SELECT * in production query — src/users/repo.py:42
           > SELECT * FROM users WHERE id = $1
           Bind columns explicitly so a future ALTER doesn't surprise readers.
         ```

      4. **If a PR exists for the current branch**, append a
         summary comment so the team sees the findings in review:
         `gh pr list --head $(git branch --show-current) --json number`
         → if non-empty, `gh pr comment <num> --body-file
         .iteration/db-security-findings-<sha>.md`.
         If no PR exists yet, skip — the findings file is on disk
         for the next fire to consume when the PR opens.

      5. **Log to `.iteration/log.jsonl`.**
         - `outcome: ok, increment_signal: true` when you produced
           any finding (high or medium).
         - `outcome: noop, increment_signal: false` when the diff
           was clean.
         - `outcome: err, increment_signal: false` when the diff
           couldn't be read (rare: detached HEAD, shallow clone).
         Include `findings_high`, `findings_medium` integer counts
         in the summary line so the meta-agent can chart trends.

      Hard rules:

      - You do NOT rewrite the migration. `automation_level:
        notify` means find + report. The author owns the fix.
      - You do NOT branch or commit. The findings file is written
        directly to `.iteration/` on the current commit.
      - You DO NOT flag patterns in lines that already existed
        before this commit — the diff scope guarantees we only
        catch *new* risk.

  - id: release-tag-checker
    purpose: "When a release commit goes in without a version bump, flag it."
    primitive: git-hook
    category: reactive
    trigger_default: "on every git commit"
    automation_default: auto
    self_evolve: false
    success_criterion: "no missed version bumps in last 10 release commits"
    stack_hints: [package.json, pyproject.toml, Cargo.toml, version.py]
    prompt_body: |
      The user just committed. Your job:

      1. Read the commit message of HEAD. If it starts with `release:` or
         `chore(release):` or matches /^v\d+\.\d+/, treat as a release commit.
      2. For release commits:
         a. Detect the version file (package.json, pyproject.toml, Cargo.toml,
            <module>/__init__.py, version.py, VERSION).
         b. Compare the version field at HEAD vs HEAD~1. If unchanged:
            i.   Branch `routines/release-tag-checker`.
            ii.  Bump patch by default (or whatever config.yaml > release.bump
                 says: patch | minor | none).
            iii. Commit `chore(release): bump version to X.Y.Z`.
            iv.  Open PR via `python3 scripts/orchestrator.py open-pr
                 --head routines/release-tag-checker --title 'Missed
                 version bump for <release SHA>' --body '<which file was
                 bumped, prior version, new version, link to release
                 commit>'`. The wrapper auto-resolves `--base` from
                 origin's default branch.
            v.   Log `increment_signal: true`.
         c. If version was bumped, log `outcome: ok, increment_signal: false`.
      3. For non-release commits, exit immediately.
